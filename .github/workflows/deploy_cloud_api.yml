name: Deploy CloudIngestionAPI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Sync code to home directory
            if [ ! -d "~/CloudIngestionAPI/.git" ]; then
              git clone https://github.com/${{ github.repository }} ~/CloudIngestionAPI
            fi
            
            cd ~/CloudIngestionAPI
            git fetch origin main
            git reset --hard origin/main
            
            # 2. Create .env from GitHub Secret
            echo "MASTER_MONITOR_API_KEY=${{ secrets.MASTER_MONITOR_API_KEY }}" > .env
            
            # 3. Handle Virtual Environment
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # 3. Handle Systemd User Service
            mkdir -p ~/.config/systemd/user/
            cp mm_cloud_api.service ~/.config/systemd/user/mm_cloud_api.service
            
            systemctl --user daemon-reload
            systemctl --user enable mm_cloud_api.service
            systemctl --user restart mm_cloud_api.service
